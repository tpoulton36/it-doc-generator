<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Documentation Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>IT Documentation Generator</h1>

    <p>
        Convert raw IT notes into structured documentation.
    </p>

    <form method="POST">
        <label for="raw_notes">Raw IT Notes</label>
        <textarea id="raw_notes" name="raw_notes" rows="12">{{ raw_notes }}</textarea>

        <button type="submit">Generate Documentation</button>
    </form>

    {% if generated_docs %}
        <section class="output-section">
            <h2>Generated Documentation</h2>
            <pre>{{ generated_docs }}</pre>
        </section>
    {% endif %}

</body>
</html>
